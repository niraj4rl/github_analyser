name: Deploy Frontend and Backend to Own Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Build frontend
        run: |
          cd src
          npm install
          npm run build

      - name: Archive frontend build
        run: |
          tar -czf frontend-dist.tar.gz -C src/dist .

      - name: Archive backend
        run: |
          tar -czf backend-app.tar.gz -C app .

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: frontend-dist.tar.gz,backend-app.tar.gz,requirements.txt,package.json
          target: ~/deployments/myapp

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/deployments/myapp
            rm -rf dist app
            mkdir -p dist app
            tar -xzf frontend-dist.tar.gz -C dist
            tar -xzf backend-app.tar.gz -C app
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            deactivate
            npm install --prefix dist || true
            pm2 restart my-backend || pm2 start venv/bin/python --name my-backend -- app/main.py
            pm2 restart my-frontend || pm2 start npx --name my-frontend -- serve dist
